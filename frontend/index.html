<!DOCTYPE html>
<html>
    <head>
        <title>ESB eCars Station Manager</title>
    </head>
    <body>
        <h1>ESB eCars - Charging Station Manager</h1>
        <p>Internal staff dashboard to manage EV charging across Ireland</p>

        <hr>

        <h2>Add New Station</h2>

        <label>Station Name:</label>
        <input type="text" id="name" placeholder="e.g. Liffey Valley">
        <br><br>

        <label>Location:</label>
        <input type="text" id="location" placeholder="e.g. Dublin">
        <br><br>   

        <label>Charger Type:</label>
        <select id="type">
            <option value="">
                Select Charger Type</option>
            <option>Fast</option>
            <option>Rapid</option>
            <option>Standard</option>
        </select>
        <br><br>

        <label>Status:</label>
        <select id="status">
            <option value="">Select Status</option>
            <option>Active</option>
            <option>Maintenance</option>
            <option>Inactive</option>
        </select>
        <br><br>

        <label>Power (kW):</label>
        <input type="number" id="power" placeholder="e.g. 50">
        <br><br>

        <label>Last Inspected:</label>
        <input type="date" id="last_inspected">
        <br><br>
        
        <button onclick="addStation()">Add Station</button>

        <hr>

        <h2>Search Stations</h2>

        <label>search by Name or Location:</label>
        <input type="text" id="searchInput" placeholder="e.g. Dublin">
        <br><br>

        <label>Filter by Status:</label>
        <select id="filterStatus">
            <option value="">All Stations</option>
            <option>Active</option>
            <option>Maintenance</option>
            <option>Inactive</option>
        </select>  
        <br><br>

        <button onclick="searchStations()">Search</button>

        <hr>

        <h2>All Charging Stations</h2>

        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Station Name</th>
                    <th>Location</th>
                    <th>Charger Type</th>
                    <th>Status</th>
                    <th>Power (kW)</th>
                    <th>Last Inspected</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="stationsTable">
            </tbody>
        </table>

        <hr>
    <script src="app.js"></script>
    </body>
</html>
